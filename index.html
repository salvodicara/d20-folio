<!doctype html>
<!--
  The app stays OPEN to browser machine translation (a user whose language is
  neither EN nor IT may translate the page — that capability is preserved).
  The crashes auto-translate used to cause (issue #24: translator-injected
  <font> wrappers breaking React's removeChild/insertBefore) are absorbed by
  the DOM-resilience boundary adapters (src/lib/dom-resilience.ts) installed in
  src/main.tsx BEFORE React mounts — see docs/ARCHITECTURE.md § External DOM
  mutation resilience. `lang` below is only a static seed: src/i18n/index.ts
  mirrors the ACTIVE locale onto it, so the page is honestly tagged and
  same-language translation prompts are skipped.
-->
<html lang="en" data-theme="dark" data-motion="auto">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="d20 Folio — A modern D&D 2024 character sheet manager"
    />
    <meta name="theme-color" content="#0c0a07" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- Fonts are self-hosted via @fontsource (imported in src/main.tsx) for
         offline-first / zero-network — no Google Fonts CDN link needed. -->
    <style>
      html {
        background-color: #0c0a07;
      }
      /* Light-theme page background — applied pre-paint by the boot script below
         (mirrors the inline dark default) so a light-theme user never sees the
         dark page flash through before the stylesheet/store hydrate. */
      html[data-theme="light"] {
        background-color: #bca268;
      }
      /* App-shell boot splash (PWA app-shell pattern): the gilt d20 mark, shown on
         the page background while the JS bundle downloads/parses on a cold start —
         the longest unavoidable blank. It lives INSIDE #root, so React replaces it
         the instant the app paints (no removal JS, no flash). Inline so it renders
         with the HTML, before any stylesheet or font loads. */
      .boot-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background-color: #0c0a07;
        /* Its own pre-React layer, above everything; the in-app loader sits at --z-boot. */
        z-index: 9999;
      }
      html[data-theme="light"] .boot-splash {
        background-color: #bca268;
      }
      .boot-splash svg {
        width: 76px;
        height: 76px;
        filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.45));
      }
      /* Subtle breath — gated to no-preference so reduced-motion users get it static. */
      @media (prefers-reduced-motion: no-preference) {
        .boot-splash svg {
          animation: boot-pulse 1.6s ease-in-out infinite;
        }
      }
      @keyframes boot-pulse {
        0%,
        100% {
          opacity: 0.62;
          transform: scale(0.97);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
    <title>d20 Folio</title>
    <!-- Anti-FOUC boot: apply the persisted theme + the OS motion preference to
         <html> BEFORE first paint, so a light-theme / reduced-motion user never
         sees the hard-coded dark+auto default flash then restyle. Theme reads the
         persisted Zustand store ("d20-folio-ui"); motion has no in-app toggle —
         `data-motion` is a pure mirror of the OS prefers-reduced-motion setting.
         Kept tiny + dependency-free; uiStore takes over once the bundle hydrates. -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var theme = "dark";
          var raw = localStorage.getItem("d20-folio-ui");
          if (raw) {
            var s = JSON.parse(raw).state || {};
            if (s.theme) theme = s.theme;
          }
          if (theme === "system") {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          root.setAttribute("data-theme", theme);
          root.setAttribute(
            "data-motion",
            window.matchMedia("(prefers-reduced-motion: reduce)").matches
              ? "reduced"
              : "auto"
          );
        } catch (e) {
          /* defaults in the <html> attributes already cover the failure case */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Boot splash (removed automatically when React renders into #root). The
           gilt d20 mark, inlined so it paints with the HTML before any CSS/JS. -->
      <div class="boot-splash" aria-hidden="true">
        <svg

          <polygon

          />
          <polygon

            fill="url(#bf)"

            stroke-width="0.9"
            stroke-linejoin="round"
          />
          <polygon
            points="50,23.4 27,63.3 13,28.5"
            fill="url(#bm)"
            stroke="#3d2f12"
            stroke-width="0.9"
            stroke-linejoin="round"
          />
          <polygon

            fill="url(#bm)"

            stroke-width="0.9"
            stroke-linejoin="round"
          />
          <polygon

            stroke-width="0.9"
            stroke-linejoin="round"
          />
          <polygon

            fill="url(#bd)"
            stroke="#3d2f12"
            stroke-width="0.9"
            stroke-linejoin="round"
          />
          <polygon
            points="27,63.3 13,71.5 50,93"
            fill="url(#bd)"
            stroke="#3d2f12"
            stroke-width="0.9"
            stroke-linejoin="round"
          />
          <polygon
            points="73,63.3 87,71.5 50,93"
            fill="url(#bd)"
            stroke="#3d2f12"
            stroke-width="0.9"
            stroke-linejoin="round"
          />
          <polygon
            points="73,63.3 27,63.3 50,93"
            fill="url(#bd)"
            stroke="#3d2f12"
            stroke-width="0.9"
            stroke-linejoin="round"
          />
          <polygon
            points="50,23.4 73,63.3 27,63.3"
            fill="url(#bg)"
            stroke="#f5e6b8"
            stroke-width="1.3"
            stroke-linejoin="round"
          />
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
